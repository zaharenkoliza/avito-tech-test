services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    command:
      - pull
      - ${OLLAMA_MODEL:-llama3:latest}
    restart: "no"

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    network_mode: "service:api"
    command: npx tsx watch server.ts
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    environment:
      PORT: 8081
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3:latest}
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./server:/app
      - server_node_modules:/app/node_modules
    restart: unless-stopped

  api:
    image: alpine/socat
    command:
      - TCP-LISTEN:8080,fork,reuseaddr,bind=0.0.0.0
      - TCP:127.0.0.1:8081
    ports:
      - "8080:8080"
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    depends_on:
      - server
      - api
    environment:
      VITE_API_BASE_URL: http://localhost:8080
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "100"
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    restart: unless-stopped

volumes:
  ollama_data:
  server_node_modules:
  client_node_modules:
